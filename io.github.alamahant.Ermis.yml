app-id: io.github.alamahant.Ermis
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: Ermis
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
# Needed for two instances of the app to send/receive steganography content embedded in icmp/udp/dns or http packets.
  - --share=network
modules:
  - name: Ermis
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/Ermis.git
        tag: v1.1.1
        commit: 0c32b78ba105767eb4b79e1df51bc4a10c09e0b8
      
